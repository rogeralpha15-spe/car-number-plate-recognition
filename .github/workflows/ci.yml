name: Python CI for CNR

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libtesseract-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python pytesseract numpy Pillow matplotlib pytest

      - name: Test imports
        run: |
          python -c "import cv2, pytesseract, numpy, PIL; print('Imports OK')"
